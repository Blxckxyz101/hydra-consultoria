openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Lelouch Britannia Panel API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: attacks
  - name: methods
  - name: check
  - name: analyze
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /attacks:
    get:
      operationId: listAttacks
      tags: [attacks]
      summary: List all attacks
      responses:
        "200":
          description: List of attacks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attack"
    post:
      operationId: createAttack
      tags: [attacks]
      summary: Create and launch an attack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttackBody"
      responses:
        "201":
          description: Attack created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attack"
        "400":
          description: Invalid input

  /attacks/stats:
    get:
      operationId: getAttackStats
      tags: [attacks]
      summary: Aggregate stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttackStats"

  /attacks/{id}:
    get:
      operationId: getAttack
      tags: [attacks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attack
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attack"
        "404":
          description: Not found
    delete:
      operationId: deleteAttack
      tags: [attacks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /attacks/{id}/stop:
    post:
      operationId: stopAttack
      tags: [attacks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attack"
        "404":
          description: Not found

  /methods:
    get:
      operationId: listMethods
      tags: [methods]
      summary: List attack methods
      responses:
        "200":
          description: Methods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Method"

  /check:
    post:
      operationId: checkSite
      tags: [check]
      summary: Check site status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckSiteBody"
      responses:
        "200":
          description: Check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckSiteResult"

  /analyze:
    post:
      operationId: analyzeTarget
      tags: [analyze]
      summary: Analyze a target and recommend the best attack methods
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeBody"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResult"
        "400":
          description: Invalid input

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Attack:
      type: object
      properties:
        id:
          type: integer
        target:
          type: string
        port:
          type: integer
        method:
          type: string
        duration:
          type: integer
        threads:
          type: integer
        status:
          type: string
          enum: [running, stopped, finished, error]
        packetsSent:
          anyOf:
            - type: integer
            - type: "null"
        bytesSent:
          anyOf:
            - type: integer
            - type: "null"
        webhookUrl:
          anyOf:
            - type: string
            - type: "null"
        startedAt:
          type: string
          format: date-time
        stoppedAt:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        createdAt:
          type: string
          format: date-time
      required: [id,target,port,method,duration,threads,status,packetsSent,bytesSent,webhookUrl,startedAt,stoppedAt,createdAt]

    CreateAttackBody:
      type: object
      properties:
        target:
          type: string
        port:
          type: integer
        method:
          type: string
        duration:
          type: integer
        threads:
          type: integer
        webhookUrl:
          anyOf:
            - type: string
            - type: "null"
      required: [target,port,method,duration,threads]

    AttackStats:
      type: object
      properties:
        totalAttacks:
          type: integer
        runningAttacks:
          type: integer
        totalPacketsSent:
          type: integer
        totalBytesSent:
          type: integer
        attacksByMethod:
          type: array
          items:
            $ref: "#/components/schemas/MethodCount"
        recentAttacks:
          type: array
          items:
            $ref: "#/components/schemas/Attack"
      required: [totalAttacks,runningAttacks,totalPacketsSent,totalBytesSent,attacksByMethod,recentAttacks]

    MethodCount:
      type: object
      properties:
        method:
          type: string
        count:
          type: integer
      required: [method, count]

    Method:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        layer:
          type: string
          enum: [L3, L4, L7]
        protocol:
          type: string
          enum: [UDP, TCP, HTTP, ICMP]
        description:
          type: string
      required: [id, name, layer, protocol, description]

    CheckSiteBody:
      type: object
      properties:
        url:
          type: string
      required: [url]

    CheckSiteResult:
      type: object
      properties:
        up:
          type: boolean
        status:
          type: integer
        statusText:
          type: string
        responseTime:
          type: integer
        error:
          anyOf:
            - type: string
            - type: "null"
      required: [up, status, statusText, responseTime, error]

    AnalyzeBody:
      type: object
      properties:
        url:
          type: string
      required: [url]

    AnalyzeResult:
      type: object
      properties:
        target:
          type: string
        ip:
          anyOf:
            - type: string
            - type: "null"
        isIP:
          type: boolean
        httpAvailable:
          type: boolean
        httpsAvailable:
          type: boolean
        responseTimeMs:
          type: integer
        serverHeader:
          type: string
        isCDN:
          type: boolean
        cdnProvider:
          type: string
        openPorts:
          type: array
          items:
            type: integer
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/MethodRecommendation"
      required: [target,ip,isIP,httpAvailable,httpsAvailable,responseTimeMs,serverHeader,isCDN,cdnProvider,openPorts,recommendations]

    MethodRecommendation:
      type: object
      properties:
        method:
          type: string
        name:
          type: string
        score:
          type: integer
        reason:
          type: string
        suggestedThreads:
          type: integer
        suggestedDuration:
          type: integer
        protocol:
          type: string
        amplification:
          type: number
        tier:
          type: string
          enum: [S, A, B, C, D]
      required: [method, name, score, reason, suggestedThreads, suggestedDuration, protocol, amplification, tier]
