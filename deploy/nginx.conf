# Nginx — Lelouch Britannia Panel
# Coloque em /etc/nginx/sites-available/lelouch
# Depois: ln -s /etc/nginx/sites-available/lelouch /etc/nginx/sites-enabled/
#         nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name _;          # ou seu domínio: meusite.com

    # ── Painel (frontend estático) ──────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:22453;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }

    # ── API (backend Express) ───────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;

        # SSE — sem buffer para streaming em tempo real
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    # ── Compressão ──────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1024;

    client_max_body_size 10M;
}
