[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g pnpm@10",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["pnpm --filter @workspace/api-server run build"]

[start]
cmd = "node --enable-source-maps --max-old-space-size=768 --max-http-header-size=16384 artifacts/api-server/dist/index.mjs"
