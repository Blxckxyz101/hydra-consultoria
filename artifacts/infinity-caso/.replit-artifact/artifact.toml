kind = "video"
previewPath = "/infinity-caso/"
title = "Infinity Search — O Caso"
version = "1.0.0"
id = "artifacts/infinity-caso"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/infinity-caso/" ]
localPort = 21724

[services.development]
run = "pnpm --filter @workspace/infinity-caso run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/infinity-caso", "run", "build" ]
publicDir = "artifacts/infinity-caso/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21724"
BASE_PATH = "/infinity-caso/"
