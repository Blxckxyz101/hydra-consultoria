kind = "web"
previewPath = "/"
title = "MikuMikuBeam Panel"
version = "1.0.0"
id = "artifacts/mikubeam-panel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22453

[services.development]
run = "pnpm --filter @workspace/mikubeam-panel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mikubeam-panel", "run", "build" ]
publicDir = "artifacts/mikubeam-panel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22453"
BASE_PATH = "/"
