kind = "web"
  previewPath = "/"
  title = "Hydra Consultoria"
  version = "1.0.0"
  id = "artifacts/infinity-search"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 22153

  [services.development]
  run = "pnpm --filter @workspace/hydra-consultoria run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/hydra-consultoria", "run", "build" ]
  publicDir = "artifacts/infinity-search/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "22153"
  BASE_PATH = "/"
