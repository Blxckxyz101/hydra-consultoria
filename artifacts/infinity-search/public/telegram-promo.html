<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  .bg {
    width: 100%; height: 100%;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, #0a2a3a 0%, #000 60%),
                radial-gradient(ellipse 50% 40% at 80% 100%, #001a2a 0%, transparent 70%);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }
  /* grid lines */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,200,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  /* glow orbs */
  .orb1 { position:absolute; width:500px; height:500px; border-radius:50%; background: radial-gradient(circle, rgba(0,200,255,0.12) 0%, transparent 70%); top:-100px; left:50%; transform:translateX(-50%); }
  .orb2 { position:absolute; width:300px; height:300px; border-radius:50%; background: radial-gradient(circle, rgba(0,150,255,0.08) 0%, transparent 70%); bottom:50px; right:80px; }
  
  .content { position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; text-align:center; padding: 60px 80px; }

  .logo-wrap { position:relative; margin-bottom:48px; }
  .logo-ring {
    width: 140px; height: 140px; border-radius: 50%;
    border: 2px solid rgba(0,200,255,0.5);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 8px rgba(0,200,255,0.06), 0 0 60px rgba(0,200,255,0.25), inset 0 0 40px rgba(0,200,255,0.06);
    background: rgba(0,200,255,0.05);
  }
  .logo-inner { font-size: 70px; line-height:1; }

  .badge {
    position: absolute; bottom:-8px; left:50%; transform:translateX(-50%);
    background: linear-gradient(90deg, #00c8ff, #0080ff);
    color: #000; font-size: 11px; font-weight: 800; letter-spacing: 0.3em;
    padding: 4px 16px; border-radius: 100px; white-space: nowrap;
  }

  .headline {
    font-size: 62px; font-weight: 800; color: #fff;
    letter-spacing: -1px; line-height: 1.1;
    margin-bottom: 16px;
  }
  .headline span { 
    background: linear-gradient(90deg, #00c8ff, #38bdf8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .sub {
    font-size: 28px; color: rgba(255,255,255,0.55);
    font-weight: 400; margin-bottom: 56px; line-height: 1.5;
    max-width: 700px;
  }

  .help-card {
    background: rgba(0,200,255,0.06);
    border: 1px solid rgba(0,200,255,0.22);
    border-radius: 24px;
    padding: 40px 56px;
    margin-bottom: 48px;
    width: 100%;
    max-width: 800px;
    box-shadow: 0 0 60px rgba(0,200,255,0.08);
  }
  .help-title {
    font-size: 20px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase;
    color: rgba(0,200,255,0.7); margin-bottom: 20px;
  }
  .help-main {
    font-size: 46px; font-weight: 800; color: #fff; margin-bottom: 8px;
  }
  .help-sub {
    font-size: 22px; color: rgba(255,255,255,0.45);
  }

  .handles {
    display: flex; gap: 20px; margin-bottom: 56px; flex-wrap: wrap; justify-content: center;
  }
  .handle {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    padding: 12px 28px;
    font-size: 20px; color: rgba(255,255,255,0.75); font-weight: 600;
  }
  .handle-dot { width:10px; height:10px; border-radius:50%; background:#00c8ff; box-shadow: 0 0 8px #00c8ff; }

  .divider {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,200,255,0.3), transparent);
    margin-bottom: 36px;
  }

  .footer {
    font-size: 18px; color: rgba(255,255,255,0.25); letter-spacing: 0.4em; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="bg">
  <div class="grid"></div>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="content">
    <div class="logo-wrap">
      <div class="logo-ring">
        <div class="logo-inner">∞</div>
      </div>
      <div class="badge">HYDRA CONSULTORIA</div>
    </div>

    <div class="headline">Precisa de <span>ajuda?</span></div>
    <div class="sub">Nossa equipe está pronta para te atender.<br>Entre em contato com o suporte oficial.</div>

    <div class="help-card">
      <div class="help-title">💬 Suporte Direto</div>
      <div class="help-main">Fale conosco</div>
      <div class="help-sub">Atendimento rápido e personalizado</div>
    </div>

    <div class="handles">
      <div class="handle"><div class="handle-dot"></div>@Blxckxyz</div>
      <div class="handle"><div class="handle-dot"></div>@xxmathexx</div>
      <div class="handle"><div class="handle-dot"></div>@piancooz</div>
    </div>

    <div class="divider"></div>
    <div class="footer">hydraconsultoria.pro</div>
  </div>
</div>
</body>
</html>
