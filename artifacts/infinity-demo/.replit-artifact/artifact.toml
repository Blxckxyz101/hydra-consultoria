kind = "video"
previewPath = "/infinity-demo/"
title = "Infinity Search — Demo"
version = "1.0.0"
id = "artifacts/infinity-demo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/infinity-demo/" ]
localPort = 22953

[services.development]
run = "pnpm --filter @workspace/infinity-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/infinity-demo", "run", "build" ]
publicDir = "artifacts/infinity-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22953"
BASE_PATH = "/infinity-demo/"
